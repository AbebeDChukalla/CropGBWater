<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Tell mobile UAs (LinkedIn / Facebook in-app browsers, Chrome Android Auto
       Dark Mode, Edge auto-contrast, etc.) that we render in a light theme and
       do NOT want any auto-invert/darken transform. Without these tags, the
       LinkedIn in-app browser was auto-darkening the cream/paper canvas on
       mobile. The in-page Tweaks panel still lets users opt into dark mode
       manually via the data-dark attribute. -->
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f3efe6" />
  <meta name="supported-color-schemes" content="light" />
  <title>CropGBWater · Atlas of agricultural green &amp; blue water use, 2000-2020</title>
  <meta name="description" content="Global atlas of green and blue crop water consumption across 46 crops at 0.083 degree resolution for 2000, 2010 and 2020. Total crop water use rose 9% from 2010 to 2020 — almost entirely from rainfall, not irrigation." />

  <!-- Open Graph / LinkedIn / Facebook -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="CropGBWater" />
  <meta property="og:title"       content="CropGBWater · Atlas of agricultural green &amp; blue water use" />
  <meta property="og:description" content="Global atlas across 46 crops, 172 countries, 2000-2020. Total crop water use rose 9% in a decade — almost entirely from rainfall, not irrigation." />
  <meta property="og:url"         content="https://abebedchukalla.github.io/CropGBWater/" />
  <meta property="og:image"       content="https://abebedchukalla.github.io/CropGBWater/social-preview.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"   content="Headline: the world's farms drink 8.7% more water than they did a decade ago. Green vs blue water split visual." />

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="CropGBWater · Atlas of agricultural green &amp; blue water use" />
  <meta name="twitter:description" content="Global atlas across 46 crops, 172 countries, 2000-2020. +9% in a decade — almost all from rainfall." />
  <meta name="twitter:image"       content="https://abebedchukalla.github.io/CropGBWater/social-preview.png" />

  <link rel="canonical" href="https://abebedchukalla.github.io/CropGBWater/" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Schibsted+Grotesk:wght@400;500;600;700&family=Geist:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-loading="1">
  <!-- Internet Explorer fallback ----------------------------------------
       The atlas uses React 18, ES2015+ syntax, CSS Grid, color-mix(),
       backdrop-filter and other features that IE11 cannot parse. Rather
       than letting an IE visitor see a half-broken page, this tiny ES5
       script detects IE up front and replaces the boot screen with a
       short message pointing them at a supported browser. Modern
       browsers skip the script entirely (the regex never matches).
  -->
  <script>
    (function () {
      var ua = navigator.userAgent || "";
      var isIE = (/Trident\//.test(ua) || /MSIE \d/.test(ua)) && !/Edg\//.test(ua);
      if (!isIE) return;
      var inject = function () {
        try { document.body.setAttribute("data-loading", "0"); } catch (e) {}
        var root = document.getElementById("root");
        if (root) root.style.display = "none";
        var div = document.createElement("div");
        div.id = "ie-fallback";
        div.style.cssText = "position:fixed;left:0;top:0;right:0;bottom:0;background:#f3efe6;color:#14140f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;font-family:Georgia,'Times New Roman',serif;z-index:99999;text-align:center;";
        div.innerHTML =
          '<div style="max-width:540px">' +
            '<div style="width:60px;height:60px;margin:0 auto 18px;border-radius:50%;background:linear-gradient(135deg,#2d5a3d 0%,#1e4a7a 100%)"></div>' +
            '<h1 style="font-family:Georgia,serif;font-size:34px;line-height:1.1;margin:0 0 14px;color:#2d5a3d">CropGBWater</h1>' +
            '<p style="font-size:18px;line-height:1.55;margin:0 0 18px;color:#4a4842">' +
              'This interactive atlas uses modern web features that <b>Internet Explorer</b> doesn\'t support.' +
            '</p>' +
            '<p style="font-size:15px;line-height:1.55;margin:0 0 24px;color:#4a4842">' +
              'Please reopen this page in <b>Microsoft Edge</b>, <b>Google Chrome</b>, <b>Mozilla Firefox</b>, or <b>Apple Safari</b>.' +
            '</p>' +
            '<p style="font-family:Consolas,Courier,monospace;font-size:13px;color:#8a877d;word-break:break-all;background:#ebe6d8;padding:10px 14px;border-radius:6px;display:inline-block">' +
              'https://abebedchukalla.github.io/CropGBWater/' +
            '</p>' +
            '<p style="font-size:12px;color:#8a877d;margin:22px 0 0">' +
              'Microsoft retired Internet Explorer in June 2022. Edge is preinstalled on Windows.' +
            '</p>' +
          '</div>';
        document.body.appendChild(div);
      };
      if (document.body) inject();
      else if (document.addEventListener) document.addEventListener("DOMContentLoaded", inject);
    })();
  </script>

  <div id="root">
    <div class="boot">
      <span class="boot-mark">
        <svg viewBox="0 0 28 28" width="28" height="28" aria-hidden="true">
          <circle cx="10" cy="14" r="8" fill="#2d5a3d" />
          <circle cx="18" cy="14" r="8" fill="#1e4a7a" style="mix-blend-mode: multiply; opacity: .92" />
        </svg>
      </span>
      <span class="boot-word">Crop<b style="color:#2d5a3d;font-weight:800">G</b><b style="color:#1e4a7a;font-weight:800">B</b>Water</span>
      <span class="boot-meta">46 crops · 172 countries · 2000–2020 · with AI Insights &amp; Copilot</span>
    </div>
  </div>

  <!-- React + Babel pinned (no build step required) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- Leaflet runtime -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Plain JS helpers (no JSX, so load first) -->
  <script src="js/util.js"></script>

  <!-- React components (in render order) -->
  <script type="text/babel" data-presets="react" src="js/components/topbar.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/hero.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/highlights.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/overview_extras.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/basin_stress.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/atlas.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/ranking.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/crops.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/trends.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/footer.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/feedback.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/tweaks.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/ai_insights.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/roadmap.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/copilot.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/app.jsx"></script>
</body>
</html>
